trigger:
- main

pool:
  vmImage: 'windows-2022'

variables:
  solution: '**/*.sln'
  proyectoMVC: 'ManejoPresupuesto/ManejoPresupuesto.csproj'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

stages:
- stage: Build
  jobs:
  - job: BuildJob
    steps:
    - task: UseDotNet@2
      displayName: 'Instalar .NET 9'
      inputs:
        packageType: 'sdk'
        version: '9.0.x'

    - task: NuGetToolInstaller@1

    # Autenticación para feeds privados y públicos
    - task: NuGetAuthenticate@1

    - task: NuGetCommand@2
      displayName: 'Restaurar paquetes NuGet'
      inputs:
        restoreSolution: '$(solution)'

    - task: VSBuild@1
      displayName: 'Compilar solucion'
      inputs:
        solution: '**/*.sln'
        configuration: '$(buildConfiguration)'
        msbuildArgs: '/p:DSP=Microsoft.Data.Tools.Schema.Sql.SqlAzureV12DatabaseSchemaProvider'

    - task: CopyFiles@2
      displayName: 'Copiar artefactos de base de datos'
      inputs:
        Contents: '**/*.dacpac'
        flattenFolders: true
        TargetFolder: '$(Build.ArtifactStagingDirectory)/db'

    - task: DotNetCoreCLI@2
      displayName: 'Publicar artefactos web...'
      inputs:
        command: 'publish'
        projects: '$(proyectoMVC)'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/webapp'
        zipAfterPublish: false

    - task: PublishBuildArtifacts@1
      displayName: 'Publicando artefactos'
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'drop'

- stage: Deploy
  dependsOn: Build
  jobs:
  - job: DeployJob
    steps:
    - task: DownloadBuildArtifacts@0
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(Pipeline.Workspace)'

    - task: AzureWebApp@1
      displayName: 'Desplegar en Azure App Service'
      inputs:
        azureSubscription: 'ManejoPresupuesto'   # Nombre exacto del Service Connection
        appName: 'ManejoPresupuesto20260316191310'
        package: '$(Pipeline.Workspace)/drop/webapp'

